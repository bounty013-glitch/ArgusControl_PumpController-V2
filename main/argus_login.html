<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Argus Local Access</title>
  <style>
    :root { color-scheme: dark; --bg:#101114; --panel:#191a1f; --line:#383a42; --text:#f4f4f5; --muted:#a1a1aa; --green:#22c55e; --red:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:18px; background:var(--bg); color:var(--text); font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; letter-spacing:0; }
    main { width:min(390px,100%); }
    h1 { margin:0 0 5px; font-size:1.35rem; }
    .sub { color:var(--muted); margin-bottom:20px; line-height:1.45; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:7px; padding:18px; }
    label { display:block; color:var(--muted); margin:0 0 6px; font-size:.82rem; }
    input { width:100%; min-height:44px; margin-bottom:14px; padding:9px 10px; border:1px solid var(--line); border-radius:5px; background:#22242a; color:var(--text); font:inherit; }
    input:focus { outline:2px solid #4ade80; outline-offset:1px; }
    button { width:100%; min-height:44px; border:0; border-radius:5px; background:var(--green); color:#07140a; font:700 14px inherit; cursor:pointer; }
    button:disabled { opacity:.55; cursor:wait; }
    #message { min-height:21px; margin-top:12px; color:var(--muted); }
    #message.error { color:var(--red); }
    .limit { margin-top:16px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:.75rem; line-height:1.45; }
  </style>
</head>
<body>
  <main>
    <h1>Argus Local Access</h1>
    <div class="sub">Authenticate on the controller's local Service AP. Login does not grant operating authority.</div>
    <form class="panel" id="login-form">
      <label for="username">Principal</label>
      <input id="username" name="username" autocomplete="username" maxlength="32" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" maxlength="128" required>
      <button id="submit" type="submit">Sign In</button>
      <div id="message" role="status" aria-live="polite"></div>
      <div class="limit">This release uses HTTP over a protected local AP. Traffic is not protected against a capable local packet observer.</div>
    </form>
  </main>
  <script>
    "use strict";
    const form = document.getElementById("login-form");
    const button = document.getElementById("submit");
    const message = document.getElementById("message");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      message.className = "";
      message.textContent = "Verifying...";
      const username = document.getElementById("username").value;
      const passwordInput = document.getElementById("password");
      const password = passwordInput.value;
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({username, password})
        });
        passwordInput.value = "";
        const result = await response.json();
        if (response.ok && result.ok) {
          window.location.replace("/operate");
          return;
        }
        message.className = "error";
        message.textContent = response.status === 429
          ? "Too many attempts. Wait and try again."
          : response.status === 503
            ? "Login service is busy. Try again shortly."
            : "Authentication failed.";
      } catch (_) {
        passwordInput.value = "";
        message.className = "error";
        message.textContent = "Controller response unavailable.";
      }
      button.disabled = false;
    });
  </script>
</body>
</html>
